name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # This runs Ruff (NOT THE APPLICATION)
  lint-and-typecheck: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run Ruff (All Workspaces)
        run: uvx ruff check

      - name: Run Mypy
        # Mypy needs DJANGO_SETTINGS_MODULE and DATABASE_URL
        # Django needs a SECRET_KEY and PYTHONPATH
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: "ci-dummy-key"
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}
        run: uvx mypy .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run Django Tests
        env:
          SECRET_KEY: "ci-dummy-key"
          ALLOWED_HOSTS: "localhost"
          DATABASE_URL: "postgres://ci_user:ci_password@localhost:5432/ci_db"
          DB_NAME: "ci_db"
          DB_USER: "ci_user"
          DB_PASSWORD: "ci_password"
          DB_HOST: "localhost"
          DB_PORT: "5432"
        run: uv run python manage.py test 

  build-and-push:
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repository Name 
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
